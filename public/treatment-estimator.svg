<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Treatment Estimator neon illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0A22" />
      <stop offset="100%" stop-color="#1F1840" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="220" cy="180" r="140" fill="#A78BFA" opacity="0.10" />
  <circle cx="980" cy="600" r="170" fill="#2DD4BF" opacity="0.10" />

  <!-- Left: tooth chart grid -->
  <g transform="translate(110 200)">
    <rect x="0" y="0" width="320" height="380" rx="24" fill="#150F2E" stroke="#A78BFA" stroke-width="3" />
    <g transform="translate(30 40)">
      <!-- Upper row of teeth -->
      <g fill="#A78BFA" opacity="0.35">
        <rect x="0"   y="0" width="32" height="40" rx="8" />
        <rect x="40"  y="0" width="32" height="40" rx="8" />
        <rect x="80"  y="0" width="32" height="40" rx="8" />
        <rect x="120" y="0" width="32" height="40" rx="8" fill="#A78BFA" />
        <rect x="160" y="0" width="32" height="40" rx="8" fill="#A78BFA" />
        <rect x="200" y="0" width="32" height="40" rx="8" />
        <rect x="240" y="0" width="32" height="40" rx="8" />
      </g>
      <!-- Lower row -->
      <g fill="#2DD4BF" opacity="0.35" transform="translate(0 60)">
        <rect x="0"   y="0" width="32" height="40" rx="8" />
        <rect x="40"  y="0" width="32" height="40" rx="8" />
        <rect x="80"  y="0" width="32" height="40" rx="8" />
        <rect x="120" y="0" width="32" height="40" rx="8" />
        <rect x="160" y="0" width="32" height="40" rx="8" />
        <rect x="200" y="0" width="32" height="40" rx="8" />
        <rect x="240" y="0" width="32" height="40" rx="8" />
      </g>
    </g>
    <!-- Path checklist -->
    <g transform="translate(30 200)">
      <circle cx="10" cy="10" r="8" fill="#A78BFA" />
      <rect x="30" y="2" width="200" height="16" rx="6" fill="#A78BFA" opacity="0.35" />
      <circle cx="10" cy="40" r="8" fill="#A78BFA" />
      <rect x="30" y="32" width="180" height="16" rx="6" fill="#A78BFA" opacity="0.35" />
      <circle cx="10" cy="70" r="8" stroke="#A78BFA" stroke-width="2" fill="none" />
      <rect x="30" y="62" width="220" height="16" rx="6" fill="#A78BFA" opacity="0.18" />
      <circle cx="10" cy="100" r="8" stroke="#A78BFA" stroke-width="2" fill="none" />
      <rect x="30" y="92" width="160" height="16" rx="6" fill="#A78BFA" opacity="0.18" />
    </g>
  </g>

  <!-- Center: decision tree -->
  <g transform="translate(490 220)" stroke="#A78BFA" stroke-width="3" fill="none">
    <line x1="180" y1="40" x2="60" y2="140" />
    <line x1="180" y1="40" x2="180" y2="140" />
    <line x1="180" y1="40" x2="300" y2="140" />
    <line x1="60" y1="170" x2="20" y2="270" />
    <line x1="60" y1="170" x2="100" y2="270" />
    <line x1="180" y1="170" x2="180" y2="270" />
    <line x1="300" y1="170" x2="260" y2="270" />
    <line x1="300" y1="170" x2="340" y2="270" />
  </g>
  <g transform="translate(490 220)" fill="url(#accent)">
    <circle cx="180" cy="40" r="22" />
    <circle cx="60" cy="160" r="18" />
    <circle cx="180" cy="160" r="18" />
    <circle cx="300" cy="160" r="18" />
    <circle cx="20" cy="280" r="14" fill="#2DD4BF" />
    <circle cx="100" cy="280" r="14" fill="#2DD4BF" />
    <circle cx="180" cy="280" r="14" fill="#2DD4BF" />
    <circle cx="260" cy="280" r="14" fill="#2DD4BF" />
    <circle cx="340" cy="280" r="14" fill="#2DD4BF" />
  </g>

  <!-- Right: price snapshot card -->
  <g transform="translate(920 220)">
    <rect x="0" y="0" width="180" height="340" rx="24" fill="#150F2E" stroke="#2DD4BF" stroke-width="3" />
    <rect x="30" y="30" width="120" height="14" rx="4" fill="#2DD4BF" opacity="0.5" />
    <rect x="30" y="60" width="80" height="22" rx="6" fill="url(#teal)" />
    <rect x="30" y="100" width="120" height="10" rx="3" fill="#2DD4BF" opacity="0.35" />
    <rect x="30" y="120" width="100" height="10" rx="3" fill="#2DD4BF" opacity="0.35" />
    <rect x="30" y="140" width="120" height="10" rx="3" fill="#2DD4BF" opacity="0.35" />
    <rect x="30" y="170" width="120" height="14" rx="4" fill="#A78BFA" opacity="0.6" />
    <rect x="30" y="200" width="80" height="22" rx="6" fill="url(#accent)" />
    <line x1="30" y1="245" x2="150" y2="245" stroke="#2DD4BF" stroke-width="2" stroke-dasharray="4 4" />
    <rect x="30" y="260" width="60" height="14" rx="4" fill="#2DD4BF" opacity="0.7" />
    <rect x="30" y="285" width="120" height="22" rx="6" fill="url(#accent)" />
    <text x="90" y="320" fill="#94A3B8" font-size="9" text-anchor="middle" font-family="Roboto, sans-serif">FROZEN AT CAPTURE</text>
  </g>

  <text x="80" y="120" fill="#A78BFA" font-size="34" font-family="Roboto, sans-serif" letter-spacing="4">TREATMENT ESTIMATOR</text>
  <text x="80" y="720" fill="#9CA3AF" font-size="20" font-family="Roboto, sans-serif" letter-spacing="3">Decision tree · 5 pricing models · Frozen quotes</text>
</svg>
