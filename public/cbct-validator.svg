<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="CBCT Scan Validator neon illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06121A" />
      <stop offset="100%" stop-color="#0E2236" />
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="220" cy="180" r="140" fill="#22D3EE" opacity="0.10" />
  <circle cx="1000" cy="620" r="170" fill="#A78BFA" opacity="0.10" />

  <!-- Left: CT volume slices -->
  <g transform="translate(120 200)">
    <g stroke="#22D3EE" stroke-width="3" fill="#0B1B26">
      <rect x="0"  y="50"  width="220" height="160" rx="8" transform="skewY(-8)" opacity="0.35" />
      <rect x="0"  y="20"  width="220" height="160" rx="8" transform="skewY(-8)" opacity="0.55" />
      <rect x="0"  y="-10" width="220" height="160" rx="8" transform="skewY(-8)" opacity="0.85" />
    </g>
    <!-- Tooth silhouettes on top slice -->
    <g transform="translate(20 -15) skewY(-8)" fill="#22D3EE" opacity="0.6">
      <ellipse cx="60"  cy="80" rx="14" ry="20" />
      <ellipse cx="100" cy="78" rx="14" ry="22" />
      <ellipse cx="140" cy="80" rx="14" ry="20" />
      <ellipse cx="180" cy="82" rx="12" ry="18" />
    </g>
    <text x="0" y="280" fill="#22D3EE" font-size="14" font-family="Roboto, sans-serif" letter-spacing="2">CBCT VOLUME · 64 SLICES</text>
  </g>

  <!-- Center: pipeline -->
  <g transform="translate(420 250)" fill="none" stroke="#22D3EE" stroke-width="3">
    <line x1="0" y1="80" x2="80" y2="80" />
    <line x1="200" y1="80" x2="280" y2="80" />
    <line x1="400" y1="80" x2="480" y2="80" />
  </g>
  <g transform="translate(420 250)">
    <!-- ETL box -->
    <rect x="80" y="40" width="120" height="80" rx="14" fill="#0E2236" stroke="#22D3EE" stroke-width="3" />
    <text x="140" y="78" fill="#22D3EE" font-size="14" text-anchor="middle" font-family="Roboto, sans-serif">ETL</text>
    <text x="140" y="98" fill="#94A3B8" font-size="10" text-anchor="middle" font-family="Roboto, sans-serif">parity-checked</text>
    <!-- Encoder box -->
    <rect x="280" y="20" width="120" height="120" rx="14" fill="#0E2236" stroke="#A78BFA" stroke-width="3" />
    <circle cx="340" cy="60" r="14" fill="#A78BFA" />
    <circle cx="340" cy="100" r="14" fill="#A78BFA" opacity="0.6" />
    <text x="340" y="160" fill="#A78BFA" font-size="12" text-anchor="middle" font-family="Roboto, sans-serif">DentalSeg + BiGRU</text>
    <!-- Verdict box -->
    <rect x="480" y="40" width="120" height="80" rx="14" fill="#0E2236" stroke="#22D3EE" stroke-width="3" />
    <text x="540" y="78" fill="#22D3EE" font-size="14" text-anchor="middle" font-family="Roboto, sans-serif">VERDICT</text>
    <text x="540" y="98" fill="#94A3B8" font-size="10" text-anchor="middle" font-family="Roboto, sans-serif">5.5s e2e</text>
  </g>

  <!-- Right: probability bars -->
  <g transform="translate(880 240)">
    <rect x="0" y="0" width="200" height="300" rx="24" fill="#0E2236" stroke="#A78BFA" stroke-width="3" />
    <text x="100" y="36" fill="#A78BFA" font-size="14" text-anchor="middle" font-family="Roboto, sans-serif" letter-spacing="2">CLASS PROBS</text>
    <rect x="30" y="60"  width="140" height="14" rx="4" fill="url(#cyan)" />
    <rect x="30" y="90"  width="100" height="14" rx="4" fill="url(#cyan)" opacity="0.8" />
    <rect x="30" y="120" width="70" height="14" rx="4" fill="url(#violet)" />
    <rect x="30" y="150" width="50" height="14" rx="4" fill="url(#violet)" opacity="0.8" />
    <rect x="30" y="180" width="32" height="14" rx="4" fill="url(#violet)" opacity="0.6" />
    <line x1="30" y1="220" x2="170" y2="220" stroke="#A78BFA" stroke-dasharray="4 4" />
    <text x="100" y="248" fill="#22D3EE" font-size="20" text-anchor="middle" font-family="Roboto, sans-serif" font-weight="bold">PASS</text>
    <text x="100" y="270" fill="#94A3B8" font-size="10" text-anchor="middle" font-family="Roboto, sans-serif">threshold 0.176</text>
  </g>

  <text x="80" y="120" fill="#22D3EE" font-size="34" font-family="Roboto, sans-serif" letter-spacing="4">CBCT SCAN VALIDATOR</text>
  <text x="80" y="720" fill="#9CA3AF" font-size="20" font-family="Roboto, sans-serif" letter-spacing="3">13-class taxonomy · OpenVINO · CICT-gated</text>
</svg>
