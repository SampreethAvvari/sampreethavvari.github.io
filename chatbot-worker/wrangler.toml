name = "sampreeth-chatbot"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Llama 3.1 8B Instruct runs on Cloudflare Workers AI. Free under the
# 10,000-neurons/day allowance, no API key, native to this worker.
# Swap to "@cf/meta/llama-3.2-3b-instruct" if you want a faster/cheaper
# model — quality is fine for portfolio chat but reasoning is weaker.
[vars]
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
ALLOWED_ORIGINS = "https://sampreethavvari.github.io,http://localhost:4321,http://localhost:3000"

[ai]
binding = "AI"

[observability]
enabled = true
