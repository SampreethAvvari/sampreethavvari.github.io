name = "sampreeth-chatbot"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Llama 3.1 8B Instruct (fast variant) on Cloudflare Workers AI. Free under
# the 10,000-neurons/day allowance, no API key, native to this worker via the
# AI binding. The base "@cf/meta/llama-3.1-8b-instruct" slug was deprecated by
# Cloudflare on 2026-05-30; the -fast and -lora variants stay active.
[vars]
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"
ALLOWED_ORIGINS = "https://sampreethavvari.github.io,http://localhost:4321,http://localhost:3000"

[ai]
binding = "AI"

[observability]
enabled = true
